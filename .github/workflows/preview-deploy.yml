name: Preview Deploy

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

# Cancel previous run on same PR when a new commit is pushed
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          AUTH_SECRET: ci-test-secret-not-real
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  deploy:
    name: Deploy preview
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Assert DATABASE_URL is not production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if echo "$DATABASE_URL" | grep -qiE "prod[^a-z]|production"; then
            echo "ERROR: DATABASE_URL appears to be a production database. Aborting." >&2
            exit 1
          fi

      - name: Wipe and reseed preview database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npx prisma migrate reset --force
          npx ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed.ts

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy | tail -1)
          {
            echo "url<<EOF"
            echo "$DEPLOY_URL"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "Preview deployed: ${PREVIEW_URL}" \
            --edit-last || \
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "Preview deployed: ${PREVIEW_URL}"
