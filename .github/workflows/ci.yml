name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs on the same branch/PR when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      # Generates @prisma/client types needed for tsc; no real DB connection made
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          # Dummy value — NextAuth validates AUTH_SECRET at import time even in tests
          AUTH_SECRET: ci-test-secret-not-real
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        # Upload even on failure so devs can inspect under-covered files
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      # Cache Next.js build output — recommended by Next.js official CI guide
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-
      - name: Build Next.js
        run: npm run build
        env:
          # NextAuth v5 validates AUTH_SECRET at initialisation time during next build
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          # Not queried at build time; must be syntactically valid for Prisma module init
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_TELEMETRY_DISABLED: "1"

  migrate-check:
    name: Migration check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Validate Prisma schema syntax
        run: npx prisma validate
      - name: Apply all migrations
        run: npx prisma migrate deploy
      # Detects drift: schema.prisma describes state that migrations won't produce.
      # Exit code 2 = drift found (fails job). Exit code 0 = clean.
      - name: Check for schema drift
        run: |
          npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema ./prisma/schema.prisma \
            --exit-code
